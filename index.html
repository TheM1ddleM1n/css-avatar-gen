<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Avatar Generator</title>
  <meta name="description" content="Generate unique CSS-only avatars from any name or seed. No canvas, no images — pure CSS shapes." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header class="hero">
    <div class="badge">✦ Pure CSS · No Canvas · No Images</div>
    <h1>Avatar Generator</h1>
    <p class="subtitle">Unique avatars from any name — built entirely from CSS shapes.</p>
  </header>

  <main class="app">
    <div class="controls">
      <div class="input-wrap">
        <span class="input-icon">⟡</span>
        <input type="text" id="seed-input" placeholder="Type a name or anything..." autocomplete="off" />
        <button class="clear-btn" id="clear-btn" aria-label="Clear">✕</button>
      </div>
      <button id="randomize-btn" class="btn-primary">
        <span class="btn-icon">⟳</span> Randomize
      </button>
      <button id="export-btn" class="btn-secondary">
        <span class="btn-icon">↓</span> Export SVG
      </button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="grid">Grid</button>
      <button class="tab" data-tab="single">Single</button>
      <button class="tab" data-tab="showcase">Showcase</button>
    </div>

    <div class="tab-panel active" id="tab-grid">
      <div class="avatar-grid" id="avatar-grid"></div>
    </div>

    <div class="tab-panel" id="tab-single">
      <div class="single-view">
        <div class="single-avatar-wrap" id="single-avatar-wrap"></div>
        <div class="single-info" id="single-info"></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-showcase">
      <div class="showcase-grid" id="showcase-grid"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <footer>
    <p>Made with <span class="heart">♥</span> using only CSS shapes &amp; vanilla JS</p>
    <a href="https://github.com" class="github-link" target="_blank" rel="noopener">
      ★ Star on GitHub
    </a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
